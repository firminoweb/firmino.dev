<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="firmino.dev blog">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0e2d"/>
      <stop offset="100%" stop-color="#10142a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#4263eb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4263eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.45">
      <stop offset="0%" stop-color="#5c7cfa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5c7cfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#5c7cfa" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4263eb" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5c7cfa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4263eb" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <line x1="120" y1="180" x2="1080" y2="180" stroke="url(#accent-line)" stroke-width="1"/>
  <line x1="120" y1="450" x2="1080" y2="450" stroke="url(#accent-line)" stroke-width="1"/>

  <g transform="translate(120, 240)" font-family="Georgia, 'Playfair Display', serif">
    <text x="0" y="0" fill="#5c7cfa" font-size="14" letter-spacing="6" font-weight="600" font-family="'Helvetica Neue', sans-serif">FIRMINO.DEV</text>
    <text x="0" y="80" fill="#eef0f8" font-size="84" font-weight="500" letter-spacing="-2">Notas técnicas</text>
    <text x="0" y="150" fill="#5c7cfa" font-size="84" font-style="italic" font-weight="500" letter-spacing="-2">de produção.</text>
  </g>

  <g transform="translate(120, 530)" font-family="'Courier New', monospace">
    <circle cx="6" cy="-6" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="22" y="0" fill="#8e92b0" font-size="14">~/blog $ next post</text>
  </g>

  <g transform="translate(960, 80)" stroke="#5c7cfa" stroke-opacity="0.4" fill="none">
    <path d="M 0 60 L 30 30 L 60 60 L 90 30 L 120 60" stroke-width="1.5"/>
    <circle cx="0" cy="60" r="3" fill="#5c7cfa" fill-opacity="0.6" stroke="none"/>
    <circle cx="60" cy="60" r="3" fill="#5c7cfa" fill-opacity="0.6" stroke="none"/>
    <circle cx="120" cy="60" r="3" fill="#5c7cfa" fill-opacity="0.6" stroke="none"/>
  </g>
</svg>
