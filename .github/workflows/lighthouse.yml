name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          NEXT_PUBLIC_SITE_URL: https://firmino.dev

      - name: Run Lighthouse CI
        run: yarn audit:lh
        env:
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Debug — list reports
        if: always()
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls -la .lighthouseci/ ==="
          ls -la .lighthouseci/ || echo "directory missing"
          echo "=== find ==="
          find .lighthouseci -type f 2>/dev/null || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: |
            .lighthouseci/**/*.html
            .lighthouseci/**/*.json
          retention-days: 14
          if-no-files-found: warn
