name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          NEXT_PUBLIC_SITE_URL: https://firmino.dev

      - name: Run Lighthouse CI
        run: yarn audit:lh
        env:
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Stage reports for upload
        if: always()
        run: |
          set -e
          echo "=== workspace ==="
          pwd
          echo
          echo "=== .lighthouseci ==="
          ls -la .lighthouseci/ 2>&1 || echo "(no .lighthouseci dir)"
          echo
          mkdir -p lighthouse-reports
          if [ -d .lighthouseci ] && [ -n "$(ls -A .lighthouseci 2>/dev/null)" ]; then
            cp -r .lighthouseci/. lighthouse-reports/
          else
            echo "no reports to stage" > lighthouse-reports/EMPTY.txt
          fi
          echo "=== staged ==="
          ls -la lighthouse-reports/

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 14
          if-no-files-found: warn
